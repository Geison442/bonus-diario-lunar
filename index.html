<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Diário Lunar</title>

  <!-- ═══ PWA & MOBILE META TAGS ═══ -->
  <meta name="theme-color" content="#170F2E">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Diário Lunar">
  <meta name="description" content="Sincronize com seu ciclo. Diário feminino de autoconhecimento e conexão lunar.">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="format-detection" content="telephone=no">
  <link rel="manifest" href="./manifest.json">

  <!-- ═══ FAVICON ═══ -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='0.9em' font-size='90'>🌙</text></svg>">
  <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='0.9em' font-size='90'>🌙</text></svg>">

  <!-- ═══ CRITICAL CSS (inline) ═══ -->
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html{scroll-behavior:smooth;-webkit-text-size-adjust:100%;height:-webkit-fill-available;overscroll-behavior:none}
    body,html{background-color:#170F2E;font-family:'Lato',system-ui,sans-serif;min-height:100vh;min-height:-webkit-fill-available;overscroll-behavior-y:none}
    #app{min-height:100vh}
    *{-webkit-tap-highlight-color:transparent}
    #loading-screen{position:fixed;inset:0;z-index:9999;background:linear-gradient(145deg,#170F2E,#26184A);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1.25rem;transition:opacity 0.7s cubic-bezier(0.16,1,0.3,1),transform 0.7s cubic-bezier(0.16,1,0.3,1);padding-top:env(safe-area-inset-top,0px)}
    #loading-screen.fade-out{opacity:0;transform:scale(1.06);pointer-events:none}
    .moon-loader{width:4.5rem;height:4.5rem;border-radius:50%;background:radial-gradient(circle at 35% 35%,#C084FC,#7C3AED);animation:moonPulse 1.8s ease-in-out infinite}
    @keyframes moonPulse{0%{box-shadow:0 0 0 0 rgba(124,58,237,0.55)}70%{box-shadow:0 0 0 22px rgba(124,58,237,0)}100%{box-shadow:0 0 0 0 rgba(124,58,237,0)}}
    .loading-title{font-family:'Georgia',serif;font-size:1.625rem;font-weight:700;color:#FAF5FF}
    .loading-sub{font-size:0.8rem;color:#C084FC;letter-spacing:0.05em}
    .loading-dots{display:flex;gap:0.375rem}
    .loading-dots span{width:0.4rem;height:0.4rem;border-radius:50%;background:#7C3AED;animation:dotBounce 1.2s infinite ease-in-out}
    .loading-dots span:nth-child(2){animation-delay:0.2s}
    .loading-dots span:nth-child(3){animation-delay:0.4s}
    @keyframes dotBounce{0%,80%,100%{transform:scale(0.55);opacity:0.35}40%{transform:scale(1);opacity:1}}
  </style>

  <!-- ═══ FULL CSS ═══ -->
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <!-- ═══ LOADING SPLASH ═══ -->
  <div id="loading-screen">
    <div class="moon-loader"></div>
    <p class="loading-title">Diário Lunar</p>
    <div class="loading-dots"><span></span><span></span><span></span></div>
    <p class="loading-sub">Preparando seu santuário...</p>
  </div>

  <!-- ═══ OFFLINE NOTICE ═══ -->
  <div id="offline-toast">
    🌑 Você está offline. Seus dados estão seguros localmente.
  </div>

  <!-- ═══ APP ROOT ═══ -->
  <div id="app"></div>

  <!-- ═══ OFFLINE DETECTION ═══ -->
  <script>
    function checkOnline() {
      var t = document.getElementById('offline-toast');
      if (!navigator.onLine) t.classList.add('show');
      else t.classList.remove('show');
    }
    window.addEventListener('offline', checkOnline);
    window.addEventListener('online', checkOnline);
  </script>

  <!-- ═══ SERVICE WORKER + STORAGE PERSIST ═══ -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function() {
        navigator.serviceWorker.register('./sw.js').catch(function(e) {
          console.warn('SW registration failed:', e);
        });
      });
    }
    if (navigator.storage && navigator.storage.persist) {
      navigator.storage.persist();
    }
  </script>

  <!-- ═══ APP JS ═══ -->
  <script>window._splashStart=Date.now();</script>
  <script src="./app.js" defer></script>
</body>
</html>
